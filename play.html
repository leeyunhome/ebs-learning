<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title id="pageTitle">학습 플레이어</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
:root {
  --bg: #0f172a; --panel: #1e293b; --accent: #38bdf8; --text: #f1f5f9; --muted: #94a3b8;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 0; line-height: 1.6; overflow-x: hidden; }

.app { display: flex; flex-direction: column; height: 100vh; max-width: 800px; margin: 0 auto; }
header { padding: 16px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.1); }
.nav-top { display: flex; align-items: center; gap: 15px; margin-bottom: 12px; }
.back-btn { color: var(--muted); text-decoration: none; font-size: 28px; flex-shrink: 0; }
.title-area { flex: 1; min-width: 0; }
.title-area h1 { margin: 0; font-size: 22px; font-weight: bold; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.play-count-badge { font-size: 13px; color: #4ade80; font-weight: 600; margin-top: 2px; display: none; }

.player-container { background: var(--panel); padding: 16px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); }
audio { width: 100%; height: 54px; border-radius: 12px; }

.controls-row { display: flex; align-items: center; flex-wrap: wrap; margin-top: 12px; gap: 8px; }
.btn-group { display: flex; gap: 6px; background: rgba(0,0,0,0.3); padding: 6px; border-radius: 12px; }
.ctrl-btn { background: none; border: none; color: var(--muted); padding: 10px 14px; border-radius: 10px; cursor: pointer; font-size: 17px; transition: 0.2s; display: flex; align-items: center; gap: 5px; white-space: nowrap; }
.ctrl-btn.active { background: var(--accent); color: white; }
.ctrl-btn.repeat-full { background: #a855f7; color: white; }
.speed-val { min-width: 60px; text-align: center; font-weight: bold; color: var(--accent); font-size: 20px; }

.script-container { flex: 1; overflow-y: auto; padding: 16px; scroll-behavior: smooth; }
.line { padding: 20px; margin-bottom: 15px; background: rgba(255,255,255,0.04); border-radius: 16px; border: 1px solid rgba(255,255,255,0.06); transition: 0.3s; cursor: pointer; }
.line:active { transform: scale(0.97); background: rgba(255,255,255,0.1); }
.line.current { background: rgba(56, 189, 248, 0.2); border-color: var(--accent); box-shadow: 0 0 20px rgba(56, 189, 248, 0.1); }
.line .time { font-size: 14px; color: var(--accent); font-weight: bold; margin-bottom: 8px; }
.line .text { font-size: 22px; font-weight: 500; word-break: keep-all; line-height: 1.4; color: #fff; }
.kor-text { display: block; font-size: 16px; color: var(--muted); margin-top: 6px; border-left: 2px solid var(--accent); padding-left: 10px; }

#loader { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
.spinner { width: 50px; height: 50px; border: 5px solid var(--panel); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="loader"><div class="spinner"></div><div style="font-size:20px;">로딩 중...</div></div>
<div class="app">
  <header>
    <div class="nav-top">
      <a href="index.html" class="back-btn"><i class="bi bi-chevron-left"></i></a>
      <div class="title-area">
        <h1 id="title">로딩 중...</h1>
        <div class="play-count-badge" id="playCountBadge"></div>
      </div>
    </div>
    <div class="player-container">
      <audio id="player" controls controlsList="nodownload noplaybackrate"></audio>
      <div class="controls-row">
        <div class="btn-group">
          <button class="ctrl-btn" onclick="changeSpeed(-0.1)"><i class="bi bi-dash-lg"></i></button>
          <div class="ctrl-btn speed-val" id="speedDisp">1.0x</div>
          <button class="ctrl-btn" onclick="changeSpeed(0.1)"><i class="bi bi-plus-lg"></i></button>
        </div>
        <div class="btn-group" style="margin-left:auto;">
          <button id="repeatBtn" class="ctrl-btn" onclick="toggleRepeat()"><i class="bi bi-repeat"></i> 반복</button>
          <button id="autoNextBtn" class="ctrl-btn active" onclick="toggleAutoNext()"><i class="bi bi-collection-play"></i> 연속</button>
        </div>
      </div>
    </div>
  </header>
  <main class="script-container" id="scriptList"></main>
</div>
<script>
const EPISODE_LIST = [{"stem": "2663_가정_리모컨은_왜_항상_사라지는가_20260302", "ep": 2663}, {"stem": "2664_일상_한밤의_기타_소리_I_20260303", "ep": 2664}, {"stem": "2665_직업_프린터야_왜_자꾸_종이를_먹어_20260304", "ep": 2665}, {"stem": "2666_관계_도서관에서_계속_엇갈리는_친구들_I_20260305", "ep": 2666}, {"stem": "2667_여행_부산_직행_열차인_줄_알았네_20260306", "ep": 2667}, {"stem": "2668_가정_배고파서_분노한_고양이_20260309", "ep": 2668}, {"stem": "2669_일상_한밤의_기타_소리_II_20260310", "ep": 2669}, {"stem": "2670_직업_필라테스는_나와_맞지_않아_20260311", "ep": 2670}, {"stem": "2671_관계_도서관에서_계속_엇갈리는_친구들_II_20260312", "ep": 2671}, {"stem": "2672_여행_체크인하며_체크아웃도_물어보기_20260313", "ep": 2672}, {"stem": "2673_가정_축구에_소질_있는_아이_20260316", "ep": 2673}, {"stem": "2674_일상_사라진_내_소포는_어디에_I_20260317", "ep": 2674}, {"stem": "2675_직업_신입_사원의_첫_출근_I_20260318", "ep": 2675}, {"stem": "2676_관계_이상하게_조용한_아이_I_20260319", "ep": 2676}, {"stem": "2677_여행_같은_곳을_계속_돌_뻔한_관광객_20260320", "ep": 2677}, {"stem": "2678_가정_엄마의_깜짝_점검_I_20260323", "ep": 2678}, {"stem": "2679_일상_사라진_내_소포는_어디에_II_20260324", "ep": 2679}, {"stem": "2680_직업_신입_사원의_첫_출근_II_20260325", "ep": 2680}, {"stem": "2681_관계_이상하게_조용한_아이_II_20260326", "ep": 2681}, {"stem": "2682_여행_한_번이라도_발라_볼걸_20260327", "ep": 2682}, {"stem": "2683_가정_엄마의_깜짝_점검_II_20260330", "ep": 2683}, {"stem": "2684_일상_지각_변명의_정석_20260331", "ep": 2684}, {"stem": "2685_직업_인형_탈_알바의_고충_20260401", "ep": 2685}, {"stem": "2686_관계_너라면_입고_다니겠니Ⅰ_20260402", "ep": 2686}, {"stem": "2687_여행_요즘에도_수동_차를_빌려주다니_20260403", "ep": 2687}, {"stem": "2688_가정_남매의_기싸움Ⅰ_20260406", "ep": 2688}, {"stem": "2689_일상_카페에서_마주친_선생님_20260407", "ep": 2689}, {"stem": "2690_직업_기장과_아이의_대화Ⅰ_20260408", "ep": 2690}, {"stem": "2691_관계_너라면_입고_다니겠니Ⅱ_20260409", "ep": 2691}, {"stem": "2692_여행_여권_하나에_깨진_우정Ⅰ_20260410", "ep": 2692}, {"stem": "2693_가정_남매의_기싸움Ⅱ_20260413", "ep": 2693}, {"stem": "2694_일상_일부러_늦게_오는_거였어_20260414", "ep": 2694}, {"stem": "2695_직업_기장과_아이의_대화Ⅱ_20260415", "ep": 2695}, {"stem": "2696_관계_수업_중엔_휴대폰_사용_금지인_거_알잖아_20260416", "ep": 2696}, {"stem": "2698_가정_전설적인_할머니_레시피_20260420", "ep": 2698}, {"stem": "2699_일상_휴대폰은_사이를_멀어지게_한다_20260421", "ep": 2699}, {"stem": "2700_직업_휴대폰_너_없이_살_순_없어_20260422", "ep": 2700}, {"stem": "2701_관계_안경이_필요한_너_20260423", "ep": 2701}, {"stem": "2702_여행_택시_타려다_돈_굳었네_20260424", "ep": 2702}, {"stem": "2703_가정_우리_모든_엄마들의_손맛_20260427", "ep": 2703}, {"stem": "2704_일상_열심히_하는_건_좋지만_잠이_더_중요해_20260428", "ep": 2704}, {"stem": "2705_직업_감자튀김은_양심상_뺐어_20260429", "ep": 2705}, {"stem": "2706_관계_작은_우산은_로맨스의_시작_20260430", "ep": 2706}, {"stem": "2707_여행_여행_가이드가_추천한_포토존_20260501", "ep": 2707}, {"stem": "2708_가정_너_정도면_청소년_아니니_20260504", "ep": 2708}, {"stem": "2709_일상_피자는_치즈가_생명이다_20260505", "ep": 2709}, {"stem": "2710_직업_뭐야_말이랑_다르잖아_20260506", "ep": 2710}, {"stem": "2711_관계_과장님_편이니_내_편이니Ⅰ_20260507", "ep": 2711}, {"stem": "2712_여행_엄마를_모시고_라스베이거스로Ⅰ_20260508", "ep": 2712}, {"stem": "2713_가정_엄마를_모시고_라스베이거스로Ⅱ_20260511", "ep": 2713}, {"stem": "2714_일상_오늘_학교_급식_딱_내_취향이야_20260512", "ep": 2714}, {"stem": "2715_직업_아이가_필요한_건_칭찬_20260513", "ep": 2715}, {"stem": "2716_관계_과장님_편이니_내_편이니_Ⅱ_20260514", "ep": 2716}, {"stem": "2717_여행_최적의_노선을_타고_가자_20260515", "ep": 2717}, {"stem": "2718_가정_화초도_소중한_생명이야_20260518", "ep": 2718}, {"stem": "2719_일상_항상_피곤한_건_이유가_있다_20260519", "ep": 2719}, {"stem": "2720_직업_성인과_중학생_자전거_대여하기_20260520", "ep": 2720}, {"stem": "2721_관계_우리_엄마의_사랑의_참견_I_20260521", "ep": 2721}, {"stem": "2722_여행_공항과_유모차_I_20260522", "ep": 2722}, {"stem": "2723_가정_전공을_고민하는_딸_20260525", "ep": 2723}, {"stem": "2724_일상_엄마의_엄격한_드레스_코드Ⅰ_20260526", "ep": 2724}, {"stem": "2725_직업_소개팅_직전_말썽인_구두_굽_20260527", "ep": 2725}, {"stem": "2726_관계_우리_엄마의_사랑의_참견Ⅱ_20260528", "ep": 2726}, {"stem": "2727_여행_공항과_유모차Ⅱ_20260529", "ep": 2727}, {"stem": "2728_가정_장마철_빨래는_최강의_난이도Ⅰ_20260601", "ep": 2728}, {"stem": "2729_일상_엄마의_엄격한_드레스_코드Ⅱ_20260602", "ep": 2729}, {"stem": "2730_직업_연예인과_매니저_20260603", "ep": 2730}, {"stem": "2731_관계_휴가_일정_충돌Ⅰ_20260604", "ep": 2731}, {"stem": "2732_여행_20260605", "ep": 2732}, {"stem": "2733_가정_장마철_빨래는_최강의_난이도Ⅱ_20260608", "ep": 2733}, {"stem": "2734_일상_이모를_위한_센스_넘치는_출산_선물_20260609", "ep": 2734}, {"stem": "2735_직업_억울함을_호소하는_운전자_20260610", "ep": 2735}, {"stem": "2736_관계_휴가_일정_충돌Ⅱ_20260611", "ep": 2736}, {"stem": "2737_여행_20260612", "ep": 2737}, {"stem": "2738_가정_엄마와_에어컨_전쟁Ⅰ_20260615", "ep": 2738}, {"stem": "2739_일상_우산에_발이_달린_건가Ⅰ_20260616", "ep": 2739}, {"stem": "2740_직업_마감_전_야근_지옥Ⅰ_20260617", "ep": 2740}, {"stem": "2741_관계_여자_친구는_눈치_100단_20260618", "ep": 2741}, {"stem": "2742_여행_오션뷰와는_많이_다른_객실_20260619", "ep": 2742}];

let SCRIPT = [];
let repeatMode = 0; // 0=off, 1=구간반복, 2=전체반복
let isAutoNext = true;
let currentIdx = -1;
const player = document.getElementById('player');
const scriptList = document.getElementById('scriptList');

// Synchronous — must run before any async operation to preserve user activation
if(new URLSearchParams(location.search).get('autoplay') === '1' || sessionStorage.getItem('ebs_autoplay') === '1') {
  player.autoplay = true;
  sessionStorage.removeItem('ebs_autoplay');
}

async function init() {
  const params = new URLSearchParams(window.location.search);
  const rawId = params.get('id');
  if(!rawId) {
    document.getElementById('loader').innerHTML = '<div>❌ 회차 ID가 없습니다.</div>';
    return;
  }

  const id = decodeURIComponent(rawId);

  try {
    const res = await fetch(`${id}_player.json?v=${Date.now()}`);
    if (!res.ok) throw new Error(`파일을 찾을 수 없습니다 (상태: ${res.status})`);

    const data = await res.json();
    SCRIPT = data.script || [];
    const epNum = data.episode_num || id.split('_')[0];
    const titleText = epNum ? `${epNum}회 ${data.subtitle || id}` : (data.subtitle || id);
    document.getElementById('title').textContent = titleText;
    document.title = titleText;
    player.src = data.mp3_url;
    if(player.autoplay) player.play().catch(() => showAutoplayHint());

    const key = 'ebs_played_' + id;
    const pdata = JSON.parse(localStorage.getItem(key) || '{}');
    pdata.play_count = (pdata.play_count || 0) + 1;
    pdata.last_played = new Date().toISOString();
    localStorage.setItem(key, JSON.stringify(pdata));
    const badge = document.getElementById('playCountBadge');
    badge.textContent = pdata.play_count + '회 청취';
    badge.style.display = 'block';

    if (SCRIPT.length === 0) {
      scriptList.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);">스크립트 데이터가 없습니다.</div>';
    }

    function escapeText(s) {
      if (s == null) return "";
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function formatText(s) {
      if (!s) return "";
      let esc = escapeText(s);
      return esc.replace(/([가-힣ㄱ-ㅎㅏ-ㅣ]+[가-힣ㄱ-ㅎㅏ-ㅣ\s\d.,!?~]*)/g, '<span class="kor-text">$1</span>');
    }

    SCRIPT.forEach((s, i) => {
      const div = document.createElement('div');
      div.className = 'line';
      div.id = `line-${i}`;
      div.innerHTML = `<div class="time">${formatTime(s.start)}</div><div class="text">${formatText(s.text)}</div>`;
      div.onclick = () => seekTo(i);
      scriptList.appendChild(div);
    });

    document.getElementById('loader').style.display = 'none';
  } catch(e) {
    console.error(e);
    document.getElementById('loader').innerHTML = `
      <div style="padding:20px;text-align:center;">
        <div style="font-size:40px;margin-bottom:10px;">⚠️</div>
        <div style="font-size:18px;margin-bottom:10px;color:var(--accent);font-weight:bold;">${e.message}</div>
        <div style="font-size:13px;color:var(--muted);margin-bottom:20px;">ID: ${id}</div>
        <button onclick="location.reload()" style="background:var(--accent);color:white;border:none;padding:12px 24px;border-radius:10px;font-weight:bold;cursor:pointer;">페이지 새로고침</button>
      </div>`;
  }
}

function showAutoplayHint() {
  const existing = document.getElementById('autoplay-hint');
  if(existing) return;
  const hint = document.createElement('div');
  hint.id = 'autoplay-hint';
  hint.style.cssText = 'position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:#38bdf8;color:#0f172a;padding:16px 32px;border-radius:40px;font-size:20px;font-weight:bold;z-index:999;cursor:pointer;box-shadow:0 4px 24px rgba(56,189,248,0.5);white-space:nowrap;';
  hint.textContent = '▶ 탭하여 재생';
  hint.onclick = function() { player.play(); hint.remove(); };
  document.body.appendChild(hint);
}

player.addEventListener('play', function() {
  const hint = document.getElementById('autoplay-hint');
  if(hint) hint.remove();
});

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}분 ${sec}초`;
}

function seekTo(idx) {
  if(idx < 0 || idx >= SCRIPT.length) return;
  player.currentTime = SCRIPT[idx].start;
  player.play();
  highlight(idx);
}

function highlight(idx) {
  if(currentIdx === idx) return;
  const old = document.getElementById(`line-${currentIdx}`);
  if(old) old.classList.remove('current');
  const el = document.getElementById(`line-${idx}`);
  if(el) {
    el.classList.add('current');
    currentIdx = idx;
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

player.ontimeupdate = () => {
  const t = player.currentTime;
  const idx = SCRIPT.findIndex(s => t >= s.start && t < s.end);
  if(idx !== -1) {
    highlight(idx);
  } else if(repeatMode === 1 && currentIdx >= 0 && SCRIPT[currentIdx] && t > SCRIPT[currentIdx].end) {
    player.currentTime = SCRIPT[currentIdx].start;
  }
};

player.addEventListener('ended', () => {
  if(repeatMode === 1 && currentIdx >= 0 && SCRIPT[currentIdx]) {
    player.currentTime = SCRIPT[currentIdx].start;
    player.play();
    return;
  }
  if(repeatMode === 2) {
    player.currentTime = 0;
    player.play();
    return;
  }
  if(isAutoNext) goNextEpisode();
});

function goNextEpisode() {
  const params = new URLSearchParams(window.location.search);
  const currentStem = decodeURIComponent(params.get('id') || '');
  const idx = EPISODE_LIST.findIndex(e => e.stem === currentStem);
  if(idx >= 0 && idx < EPISODE_LIST.length - 1) {
    const next = EPISODE_LIST[idx + 1];
    const loader = document.getElementById('loader');
    loader.style.display = 'flex';
    loader.innerHTML = '<div class="spinner"></div><div style="font-size:18px;">다음 회차 로딩 중...</div>';
    window.location.href = 'play.html?id=' + encodeURIComponent(next.stem) + '&autoplay=1';
  }
}

function changeSpeed(delta) {
  let s = Math.round((player.playbackRate + delta) * 10) / 10;
  if(s < 0.5) s = 0.5;
  if(s > 2.0) s = 2.0;
  player.playbackRate = s;
  document.getElementById('speedDisp').textContent = s.toFixed(1) + 'x';
}

function toggleRepeat() {
  repeatMode = (repeatMode + 1) % 3;
  const btn = document.getElementById('repeatBtn');
  if(repeatMode === 0) {
    btn.classList.remove('active', 'repeat-full');
    btn.innerHTML = '<i class="bi bi-repeat"></i> 반복';
  } else if(repeatMode === 1) {
    btn.classList.add('active');
    btn.classList.remove('repeat-full');
    btn.innerHTML = '<i class="bi bi-repeat-1"></i> 구간';
  } else {
    btn.classList.add('active', 'repeat-full');
    btn.innerHTML = '<i class="bi bi-repeat"></i> 전체';
  }
}

function toggleAutoNext() {
  isAutoNext = !isAutoNext;
