<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title id="pageTitle">EBS 학습 플레이어</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
:root {
  --bg: #0f172a; --panel: #1e293b; --accent: #38bdf8; --text: #f1f5f9; --muted: #94a3b8;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 0; line-height: 1.5; overflow-x: hidden; }

/* Layout */
.app { display: flex; flex-direction: column; height: 100vh; max-width: 800px; margin: 0 auto; }
header { padding: 12px 16px; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.1); }
.nav-top { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
.back-btn { color: var(--muted); text-decoration: none; font-size: 20px; }
.title-area h1 { margin: 0; font-size: 18px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* Player Container */
.player-container { background: var(--panel); padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.1); }
audio { width: 100%; height: 40px; border-radius: 8px; }

/* Custom Controls */
.controls-row { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; gap: 8px; }
.btn-group { display: flex; gap: 4px; background: rgba(0,0,0,0.2); padding: 4px; border-radius: 8px; }
.ctrl-btn { background: none; border: none; color: var(--muted); padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 14px; transition: 0.2s; }
.ctrl-btn.active { background: var(--accent); color: white; }
.speed-val { min-width: 45px; text-align: center; font-weight: bold; color: var(--accent); }

/* Script List */
.script-container { flex: 1; overflow-y: auto; padding: 12px; scroll-behavior: smooth; }
.line { padding: 14px; margin-bottom: 10px; background: rgba(255,255,255,0.03); border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; cursor: pointer; }
.line:active { transform: scale(0.98); background: rgba(255,255,255,0.08); }
.line.current { background: rgba(56, 189, 248, 0.15); border-color: var(--accent); }
.line .time { font-size: 11px; color: var(--accent); font-weight: bold; margin-bottom: 4px; }
.line .text { font-size: 16px; word-break: keep-all; }

/* Loader */
#loader { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
.spinner { width: 40px; height: 40px; border: 4px solid var(--panel); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 16px; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="loader"><div class="spinner"></div><div>학습 데이터를 불러오는 중...</div></div>

<div class="app">
  <header>
    <div class="nav-top">
      <a href="index.html" class="back-btn"><i class="bi bi-chevron-left"></i></a>
      <div class="title-area"><h1 id="title">로딩 중...</h1></div>
    </div>
    <div class="player-container">
      <audio id="player" controls controlsList="nodownload noplaybackrate"></audio>
      <div class="controls-row">
        <div class="btn-group">
          <button class="ctrl-btn" onclick="changeSpeed(-0.1)"><i class="bi bi-dash"></i></button>
          <div class="ctrl-btn speed-val" id="speedDisp">1.0x</div>
          <button class="ctrl-btn" onclick="changeSpeed(0.1)"><i class="bi bi-plus"></i></button>
        </div>
        <div class="btn-group">
          <button id="repeatBtn" class="ctrl-btn" onclick="toggleRepeat()" title="문장 반복"><i class="bi bi-repeat"></i> 문장 반복</button>
        </div>
      </div>
    </div>
  </header>

  <main class="script-container" id="scriptList"></main>
</div>

<script>
let SCRIPT = [];
let isRepeat = false;
let currentIdx = -1;
const player = document.getElementById('player');
const scriptList = document.getElementById('scriptList');

async function init() {
  const id = new URLSearchParams(window.location.search).get('id');
  if(!id) { alert("회차 정보가 없습니다."); return; }
  
  try {
    const res = await fetch(`${id}_player.json`);
    const data = await res.json();
    SCRIPT = data.script || [];
    document.getElementById('title').textContent = data.subtitle || id;
    document.title = (data.subtitle || id) + " - EBS 학습";
    player.src = data.mp3_url;

    SCRIPT.forEach((s, i) => {
      const div = document.createElement('div');
      div.className = 'line';
      div.id = `line-${i}`;
      div.innerHTML = `<div class="time">${formatTime(s.start)}</div><div class="text">${s.text}</div>`;
      div.onclick = () => { seekTo(i); };
      scriptList.appendChild(div);
    });

    document.getElementById('loader').style.display = 'none';
  } catch(e) {
    alert("데이터를 불러오지 못했습니다.");
  }
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

function seekTo(idx) {
  if(idx < 0 || idx >= SCRIPT.length) return;
  player.currentTime = SCRIPT[idx].start;
  player.play();
  highlight(idx);
}

function highlight(idx) {
  if(currentIdx === idx) return;
  const old = document.getElementById(`line-${currentIdx}`);
  if(old) old.classList.remove('current');
  
  const el = document.getElementById(`line-${idx}`);
  if(el) {
    el.classList.add('current');
    currentIdx = idx;
    // Auto Scroll
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

player.ontimeupdate = () => {
  const t = player.currentTime;
  const idx = SCRIPT.findIndex(s => t >= s.start && t < s.end);
  if(idx !== -1) {
    highlight(idx);
    if(isRepeat && t >= SCRIPT[idx].end - 0.1) {
      player.currentTime = SCRIPT[idx].start;
    }
  }
};

function changeSpeed(delta) {
  let s = Math.round((player.playbackRate + delta) * 10) / 10;
  if(s < 0.5) s = 0.5;
  if(s > 2.0) s = 2.0;
  player.playbackRate = s;
  document.getElementById('speedDisp').textContent = s.toFixed(1) + "x";
}

function toggleRepeat() {
  isRepeat = !isRepeat;
  document.getElementById('repeatBtn').classList.toggle('active', isRepeat);
}

init();
</script>
</body>
</html>
