<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EBS 왕초보 영어 - 학습 대시보드</title>
<style>
:root {
  --bg: #0f172a;
  --panel: #1e293b;
  --panel-2: #334155;
  --text: #f1f5f9;
  --muted: #94a3b8;
  --accent: #38bdf8;
  --border: #475569;
  --tag-여행: #06b6d4;
  --tag-일상: #84cc16;
  --tag-직업: #f97316;
  --tag-관계: #ec4899;
  --tag-가정: #a78bfa;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
  min-height: 100vh;
  padding: 24px 16px;
}

.container { max-width: 1280px; margin: 0 auto; }

header { margin-bottom: 24px; }
h1 {
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 4px;
}
.subtitle { color: var(--muted); font-size: 14px; }

.controls {
  background: var(--panel);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 20px;
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  align-items: center;
}

input.search {
  flex: 1;
  min-width: 200px;
  background: var(--panel-2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 14px;
}
input.search::placeholder { color: var(--muted); }

.filter-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.tag {
  background: var(--panel-2);
  color: var(--muted);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 6px 14px;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;
}
.tag:hover { background: var(--accent); color: white; border-color: var(--accent); }
.tag.active { background: var(--accent); color: white; border-color: var(--accent); }

.stats {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 16px;
}
.stats strong { color: var(--accent); }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}

.card {
  background: var(--panel);
  border-radius: 12px;
  padding: 18px;
  border: 1px solid transparent;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}
.card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
}

.card-tag {
  display: inline-block;
  font-size: 11px;
  color: white;
  padding: 3px 10px;
  border-radius: 999px;
  font-weight: 600;
  letter-spacing: 0.03em;
  margin-bottom: 10px;
}

.card-ep {
  font-size: 13px;
  color: var(--muted);
  font-weight: 600;
}
.card-title {
  font-size: 16px;
  font-weight: 600;
  line-height: 1.4;
  margin: 6px 0 10px;
}
.card-meta {
  font-size: 12px;
  color: var(--muted);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.card-played {
  position: absolute;
  top: 14px;
  right: 14px;
  font-size: 11px;
  color: var(--accent);
}

.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
}

@media (max-width: 600px) {
  body { padding: 16px 12px; }
  h1 { font-size: 22px; }
  .grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>🎧 EBS 왕초보 영어</h1>
    <div class="subtitle">총 2개 회차 · 마지막 갱신: 2026-05-09 18:22</div>
  </header>

  <div class="controls">
    <input class="search" id="search" placeholder="회차 번호 또는 제목 검색...">
    <div class="filter-tags" id="filters">
      <button class="tag active" data-cat="">전체</button>
      <!-- 카테고리는 JS로 채움 -->
    </div>
  </div>

  <div class="stats" id="stats"></div>

  <div class="grid" id="grid"></div>
</div>

<script>
const EPISODES = [{"episode": 2664, "category": "일상", "subtitle": "한밤의 기타 소리 I", "date": "2026.03.03", "stem": "2664_일상_한밤의_기타_소리_I_20260303", "html_filename": "2664_일상_한밤의_기타_소리_I_20260303.html", "duration": 55.0, "script_count": 4}, {"episode": 2663, "category": "가정", "subtitle": "리모컨은 왜 항상 사라지는가", "date": "2026.03.02", "stem": "2663_가정_리모컨은_왜_항상_사라지는가_20260302", "html_filename": "2663_가정_리모컨은_왜_항상_사라지는가_20260302.html", "duration": 42.04, "script_count": 6}];
const CATEGORY_COLORS = {
  '여행': 'var(--tag-여행)',
  '일상': 'var(--tag-일상)',
  '직업': 'var(--tag-직업)',
  '관계': 'var(--tag-관계)',
  '가정': 'var(--tag-가정)',
};

const searchEl = document.getElementById('search');
const filtersEl = document.getElementById('filters');
const gridEl = document.getElementById('grid');
const statsEl = document.getElementById('stats');

let activeCategory = '';
let searchQuery = '';

// 카테고리 필터 동적 생성
function buildFilters() {
  const cats = [...new Set(EPISODES.map(e => e.category).filter(Boolean))].sort();
  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'tag';
    btn.dataset.cat = cat;
    btn.textContent = cat;
    btn.style.cssText = `--tag-color: ${CATEGORY_COLORS[cat] || 'var(--accent)'}`;
    filtersEl.appendChild(btn);
  });

  filtersEl.querySelectorAll('.tag').forEach(btn => {
    btn.addEventListener('click', () => {
      activeCategory = btn.dataset.cat;
      filtersEl.querySelectorAll('.tag').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
  });
}

// 검색
searchEl.addEventListener('input', (e) => {
  searchQuery = e.target.value.toLowerCase().trim();
  render();
});

// 학습 기록 가져오기
function getPlayCount(stem) {
  try {
    const data = JSON.parse(localStorage.getItem('ebs_played_' + stem) || '{}');
    return data.play_count || 0;
  } catch (e) { return 0; }
}

// 카드 렌더링
function render() {
  const filtered = EPISODES.filter(ep => {
    if (activeCategory && ep.category !== activeCategory) return false;
    if (searchQuery) {
      const haystack = `${ep.episode} ${ep.subtitle} ${ep.category}`.toLowerCase();
      if (!haystack.includes(searchQuery)) return false;
    }
    return true;
  });

  // 통계
  const totalPlayed = EPISODES.filter(e => getPlayCount(e.stem) > 0).length;
  statsEl.innerHTML = `필터 결과: <strong>${filtered.length}</strong>개 / 학습 시작한 회차: <strong>${totalPlayed}</strong>개`;

  if (filtered.length === 0) {
    gridEl.innerHTML = '<div class="empty">검색 결과가 없습니다</div>';
    return;
  }

  gridEl.innerHTML = filtered.map(ep => {
    const playCount = getPlayCount(ep.stem);
    const playBadge = playCount > 0 ? `<div class="card-played">▶ ${playCount}회</div>` : '';
    const tagColor = CATEGORY_COLORS[ep.category] || 'var(--accent)';
    const minutes = Math.floor(ep.duration / 60);
    const seconds = Math.floor(ep.duration % 60);

    return `
      <a class="card" href="${ep.html_filename}">
        ${playBadge}
        ${ep.category ? `<span class="card-tag" style="background: ${tagColor}">${ep.category}</span>` : ''}
        <div class="card-ep">EP ${ep.episode || '?'}</div>
        <div class="card-title">${escapeHtml(ep.subtitle || '제목 없음')}</div>
        <div class="card-meta">
          <span>${ep.date || '?'}</span>
          <span>${minutes}분 ${seconds}초 · ${ep.script_count}문장</span>
        </div>
      </a>
    `;
  }).join('');
}

function escapeHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

buildFilters();
render();

// a 태그가 div 처럼 보이게
document.head.insertAdjacentHTML('beforeend', '<style>.card { text-decoration: none; color: inherit; display: block; }</style>');
</script>

</body>
</html>
