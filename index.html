<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EBS 왕초보 영어 - 학습 대시보드</title>
<style>
:root {
  --bg: #0f172a;
  --panel: #1e293b;
  --panel-2: #334155;
  --text: #f1f5f9;
  --muted: #94a3b8;
  --accent: #38bdf8;
  --border: #475569;
  --tag-여행: #06b6d4;
  --tag-일상: #84cc16;
  --tag-직업: #f97316;
  --tag-관계: #ec4899;
  --tag-가정: #a78bfa;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
  min-height: 100vh;
  padding: 24px 16px;
}

.container { max-width: 1280px; margin: 0 auto; }

header { margin-bottom: 24px; }
h1 {
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 4px;
}
.subtitle { color: var(--muted); font-size: 14px; }

.controls {
  background: var(--panel);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 20px;
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  align-items: center;
}

input.search {
  flex: 1;
  min-width: 200px;
  background: var(--panel-2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 14px;
}
input.search::placeholder { color: var(--muted); }

.filter-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.tag {
  background: var(--panel-2);
  color: var(--muted);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 6px 14px;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;
}
.tag:hover { background: var(--accent); color: white; border-color: var(--accent); }
.tag.active { background: var(--accent); color: white; border-color: var(--accent); }

.stats {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 16px;
}
.stats strong { color: var(--accent); }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}

.card {
  background: var(--panel);
  border-radius: 12px;
  padding: 18px;
  border: 1px solid transparent;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}
.card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
}

.card-tag {
  display: inline-block;
  font-size: 11px;
  color: white;
  padding: 3px 10px;
  border-radius: 999px;
  font-weight: 600;
  letter-spacing: 0.03em;
  margin-bottom: 10px;
}

.card-ep {
  font-size: 13px;
  color: var(--muted);
  font-weight: 600;
}
.card-title {
  font-size: 16px;
  font-weight: 600;
  line-height: 1.4;
  margin: 6px 0 10px;
}
.card-meta {
  font-size: 12px;
  color: var(--muted);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.card-played {
  position: absolute;
  top: 14px;
  right: 14px;
  font-size: 11px;
  color: var(--accent);
}

.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
}

@media (max-width: 600px) {
  body { padding: 16px 12px; }
  h1 { font-size: 22px; }
  .grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>🎧 EBS 왕초보 영어</h1>
    <div class="subtitle">총 22개 회차 · 마지막 갱신: 2026-05-09 17:07</div>
  </header>

  <div class="controls">
    <input class="search" id="search" placeholder="회차 번호 또는 제목 검색...">
    <div class="filter-tags" id="filters">
      <button class="tag active" data-cat="">전체</button>
      <!-- 카테고리는 JS로 채움 -->
    </div>
  </div>

  <div class="stats" id="stats"></div>

  <div class="grid" id="grid"></div>
</div>

<script>
const EPISODES = [{"episode": 2707, "category": "여행", "subtitle": "여행 가이드가 추천한 포토존", "date": "2026.05.01", "stem": "2707_여행_여행_가이드가_추천한_포토존_20260501", "html_filename": "2707_여행_여행_가이드가_추천한_포토존_20260501.html", "duration": 52.0, "script_count": 4}, {"episode": 2706, "category": "관계", "subtitle": "작은 우산은 로맨스의 시작", "date": "2026.04.30", "stem": "2706_관계_작은_우산은_로맨스의_시작_20260430", "html_filename": "2706_관계_작은_우산은_로맨스의_시작_20260430.html", "duration": 55.0, "script_count": 4}, {"episode": 2705, "category": "직업", "subtitle": "감자튀김은 양심상 뺐어", "date": "2026.04.29", "stem": "2705_직업_감자튀김은_양심상_뺐어_20260429", "html_filename": "2705_직업_감자튀김은_양심상_뺐어_20260429.html", "duration": 43.48, "script_count": 4}, {"episode": 2704, "category": "일상", "subtitle": "열심히 하는 건 좋지만 잠이 더 중요해", "date": "2026.04.28", "stem": "2704_일상_열심히_하는_건_좋지만_잠이_더_중요해_20260428", "html_filename": "2704_일상_열심히_하는_건_좋지만_잠이_더_중요해_20260428.html", "duration": 70.0, "script_count": 5}, {"episode": 2703, "category": "가정", "subtitle": "우리 모든 엄마들의 손맛", "date": "2026.04.27", "stem": "2703_가정_우리_모든_엄마들의_손맛_20260427", "html_filename": "2703_가정_우리_모든_엄마들의_손맛_20260427.html", "duration": 51.4, "script_count": 6}, {"episode": 2702, "category": "여행", "subtitle": "택시 타려다 돈 굳었네", "date": "2026.04.24", "stem": "2702_여행_택시_타려다_돈_굳었네_20260424", "html_filename": "2702_여행_택시_타려다_돈_굳었네_20260424.html", "duration": 50.0, "script_count": 4}, {"episode": 2701, "category": "관계", "subtitle": "안경이 필요한 너", "date": "2026.04.23", "stem": "2701_관계_안경이_필요한_너_20260423", "html_filename": "2701_관계_안경이_필요한_너_20260423.html", "duration": 43.28, "script_count": 5}, {"episode": 2700, "category": "직업", "subtitle": "휴대폰 너 없이 살 순 없어", "date": "2026.04.22", "stem": "2700_직업_휴대폰_너_없이_살_순_없어_20260422", "html_filename": "2700_직업_휴대폰_너_없이_살_순_없어_20260422.html", "duration": 48.0, "script_count": 4}, {"episode": 2698, "category": "가정", "subtitle": "전설적인 할머니 레시피", "date": "2026.04.20", "stem": "2698_가정_전설적인_할머니_레시피_20260420", "html_filename": "2698_가정_전설적인_할머니_레시피_20260420.html", "duration": 52.0, "script_count": 4}, {"episode": 2696, "category": "관계", "subtitle": "수업 중엔 휴대폰 사용 금지인 거 알잖아", "date": "2026.04.16", "stem": "2696_관계_수업_중엔_휴대폰_사용_금지인_거_알잖아_20260416", "html_filename": "2696_관계_수업_중엔_휴대폰_사용_금지인_거_알잖아_20260416.html", "duration": 44.78, "script_count": 4}, {"episode": 2695, "category": "직업", "subtitle": "기장과 아이의 대화Ⅱ", "date": "2026.04.15", "stem": "2695_직업_기장과_아이의_대화Ⅱ_20260415", "html_filename": "2695_직업_기장과_아이의_대화Ⅱ_20260415.html", "duration": 45.3, "script_count": 6}, {"episode": 2694, "category": "일상", "subtitle": "일부러 늦게 오는 거였어", "date": "2026.04.14", "stem": "2694_일상_일부러_늦게_오는_거였어_20260414", "html_filename": "2694_일상_일부러_늦게_오는_거였어_20260414.html", "duration": 53.0, "script_count": 4}, {"episode": 2693, "category": "가정", "subtitle": "남매의 기싸움Ⅱ", "date": "2026.04.13", "stem": "2693_가정_남매의_기싸움Ⅱ_20260413", "html_filename": "2693_가정_남매의_기싸움Ⅱ_20260413.html", "duration": 54.0, "script_count": 4}, {"episode": 2692, "category": "여행", "subtitle": "여권 하나에 깨진 우정Ⅰ", "date": "2026.04.10", "stem": "2692_여행_여권_하나에_깨진_우정Ⅰ_20260410", "html_filename": "2692_여행_여권_하나에_깨진_우정Ⅰ_20260410.html", "duration": 42.0, "script_count": 4}, {"episode": 2691, "category": "관계", "subtitle": "너라면 입고 다니겠니Ⅱ", "date": "2026.04.09", "stem": "2691_관계_너라면_입고_다니겠니Ⅱ_20260409", "html_filename": "2691_관계_너라면_입고_다니겠니Ⅱ_20260409.html", "duration": 141.48, "script_count": 16}, {"episode": 2690, "category": "직업", "subtitle": "기장과 아이의 대화Ⅰ", "date": "2026.04.08", "stem": "2690_직업_기장과_아이의_대화Ⅰ_20260408", "html_filename": "2690_직업_기장과_아이의_대화Ⅰ_20260408.html", "duration": 49.24, "script_count": 4}, {"episode": 2689, "category": "일상", "subtitle": "카페에서 마주친 선생님", "date": "2026.04.07", "stem": "2689_일상_카페에서_마주친_선생님_20260407", "html_filename": "2689_일상_카페에서_마주친_선생님_20260407.html", "duration": 46.0, "script_count": 4}, {"episode": 2688, "category": "가정", "subtitle": "남매의 기싸움Ⅰ", "date": "2026.04.06", "stem": "2688_가정_남매의_기싸움Ⅰ_20260406", "html_filename": "2688_가정_남매의_기싸움Ⅰ_20260406.html", "duration": 52.28, "script_count": 5}, {"episode": 2686, "category": "관계", "subtitle": "너라면 입고 다니겠니Ⅰ", "date": "2026.04.02", "stem": "2686_관계_너라면_입고_다니겠니Ⅰ_20260402", "html_filename": "2686_관계_너라면_입고_다니겠니Ⅰ_20260402.html", "duration": 39.9, "script_count": 4}, {"episode": 2685, "category": "직업", "subtitle": "인형 탈 알바의 고충", "date": "2026.04.01", "stem": "2685_직업_인형_탈_알바의_고충_20260401", "html_filename": "2685_직업_인형_탈_알바의_고충_20260401.html", "duration": 63.0, "script_count": 5}, {"episode": 2684, "category": "일상", "subtitle": "지각 변명의 정석", "date": "2026.03.31", "stem": "2684_일상_지각_변명의_정석_20260331", "html_filename": "2684_일상_지각_변명의_정석_20260331.html", "duration": 48.0, "script_count": 4}, {"episode": 2683, "category": "가정", "subtitle": "엄마의 깜짝 점검 II", "date": "2026.03.30", "stem": "2683_가정_엄마의_깜짝_점검_II_20260330", "html_filename": "2683_가정_엄마의_깜짝_점검_II_20260330.html", "duration": 51.8, "script_count": 6}];
const CATEGORY_COLORS = {
  '여행': 'var(--tag-여행)',
  '일상': 'var(--tag-일상)',
  '직업': 'var(--tag-직업)',
  '관계': 'var(--tag-관계)',
  '가정': 'var(--tag-가정)',
};

const searchEl = document.getElementById('search');
const filtersEl = document.getElementById('filters');
const gridEl = document.getElementById('grid');
const statsEl = document.getElementById('stats');

let activeCategory = '';
let searchQuery = '';

// 카테고리 필터 동적 생성
function buildFilters() {
  const cats = [...new Set(EPISODES.map(e => e.category).filter(Boolean))].sort();
  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'tag';
    btn.dataset.cat = cat;
    btn.textContent = cat;
    btn.style.cssText = `--tag-color: ${CATEGORY_COLORS[cat] || 'var(--accent)'}`;
    filtersEl.appendChild(btn);
  });

  filtersEl.querySelectorAll('.tag').forEach(btn => {
    btn.addEventListener('click', () => {
      activeCategory = btn.dataset.cat;
      filtersEl.querySelectorAll('.tag').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
  });
}

// 검색
searchEl.addEventListener('input', (e) => {
  searchQuery = e.target.value.toLowerCase().trim();
  render();
});

// 학습 기록 가져오기
function getPlayCount(stem) {
  try {
    const data = JSON.parse(localStorage.getItem('ebs_played_' + stem) || '{}');
    return data.play_count || 0;
  } catch (e) { return 0; }
}

// 카드 렌더링
function render() {
  const filtered = EPISODES.filter(ep => {
    if (activeCategory && ep.category !== activeCategory) return false;
    if (searchQuery) {
      const haystack = `${ep.episode} ${ep.subtitle} ${ep.category}`.toLowerCase();
      if (!haystack.includes(searchQuery)) return false;
    }
    return true;
  });

  // 통계
  const totalPlayed = EPISODES.filter(e => getPlayCount(e.stem) > 0).length;
  statsEl.innerHTML = `필터 결과: <strong>${filtered.length}</strong>개 / 학습 시작한 회차: <strong>${totalPlayed}</strong>개`;

  if (filtered.length === 0) {
    gridEl.innerHTML = '<div class="empty">검색 결과가 없습니다</div>';
    return;
  }

  gridEl.innerHTML = filtered.map(ep => {
    const playCount = getPlayCount(ep.stem);
    const playBadge = playCount > 0 ? `<div class="card-played">▶ ${playCount}회</div>` : '';
    const tagColor = CATEGORY_COLORS[ep.category] || 'var(--accent)';
    const minutes = Math.floor(ep.duration / 60);
    const seconds = Math.floor(ep.duration % 60);

    return `
      <a class="card" href="${ep.html_filename}">
        ${playBadge}
        ${ep.category ? `<span class="card-tag" style="background: ${tagColor}">${ep.category}</span>` : ''}
        <div class="card-ep">EP ${ep.episode || '?'}</div>
        <div class="card-title">${escapeHtml(ep.subtitle || '제목 없음')}</div>
        <div class="card-meta">
          <span>${ep.date || '?'}</span>
          <span>${minutes}분 ${seconds}초 · ${ep.script_count}문장</span>
        </div>
      </a>
    `;
  }).join('');
}

function escapeHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

buildFilters();
render();

// a 태그가 div 처럼 보이게
document.head.insertAdjacentHTML('beforeend', '<style>.card { text-decoration: none; color: inherit; display: block; }</style>');
</script>

</body>
</html>
