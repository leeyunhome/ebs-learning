<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EBS 2668회 - 배고파서 분노한 고양이</title>
<style>
:root {
  --bg: #0f172a;
  --panel: #1e293b;
  --panel-2: #334155;
  --text: #f1f5f9;
  --muted: #94a3b8;
  --accent: #38bdf8;
  --accent-hover: #0ea5e9;
  --highlight: #fbbf24;
  --highlight-bg: rgba(251, 191, 36, 0.15);
  --border: #475569;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
  min-height: 100vh;
  padding: 16px;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr;
  gap: 16px;
}

@media (min-width: 900px) {
  .container { grid-template-columns: 360px 1fr; }
}

/* 좌측: 메타 + 컨트롤 */
.controls {
  background: var(--panel);
  border-radius: 12px;
  padding: 20px;
  position: sticky;
  top: 16px;
  align-self: start;
}

.back-link {
  color: var(--muted);
  text-decoration: none;
  font-size: 13px;
  display: inline-block;
  margin-bottom: 12px;
}
.back-link:hover { color: var(--accent); }

.episode-num {
  font-size: 12px;
  color: var(--accent);
  font-weight: 600;
  letter-spacing: 0.05em;
}

.title {
  font-size: 20px;
  font-weight: 700;
  margin: 4px 0 4px;
  line-height: 1.4;
}

.meta {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 16px;
}

.audio-wrap {
  background: var(--panel-2);
  border-radius: 8px;
  padding: 12px;
  margin-bottom: 16px;
}
audio { width: 100%; }

.btn-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}

button.action {
  flex: 1;
  min-width: 70px;
  background: var(--panel-2);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 10px;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;
}
button.action:hover { background: var(--accent); border-color: var(--accent); }
button.action.active { background: var(--accent); color: white; border-color: var(--accent); }

.speed-row {
  display: flex;
  gap: 4px;
  margin-bottom: 12px;
}
button.speed {
  flex: 1;
  background: var(--panel-2);
  color: var(--muted);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 6px;
  font-size: 12px;
  cursor: pointer;
}
button.speed.active {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}

.help {
  margin-top: 12px;
  font-size: 11px;
  color: var(--muted);
  line-height: 1.6;
  border-top: 1px solid var(--border);
  padding-top: 12px;
}
.help kbd {
  background: var(--panel-2);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 1px 5px;
  font-size: 10px;
  margin-right: 2px;
}

/* 우측: 자막 */
.subtitles {
  background: var(--panel);
  border-radius: 12px;
  padding: 20px;
  max-height: calc(100vh - 32px);
  overflow-y: auto;
}

.sub-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
  position: sticky;
  top: -20px;
  background: var(--panel);
  padding: 10px 0;
  z-index: 1;
}

.sub-title { font-size: 14px; font-weight: 600; color: var(--muted); }

.line {
  padding: 12px 14px;
  margin-bottom: 6px;
  border-radius: 8px;
  background: var(--panel-2);
  cursor: pointer;
  transition: all 0.15s;
  border-left: 3px solid transparent;
  position: relative;
}
.line:hover { background: #475569; }

.line.current {
  background: var(--highlight-bg);
  border-left-color: var(--highlight);
}

.line-time {
  font-size: 11px;
  color: var(--muted);
  font-family: 'SF Mono', Consolas, monospace;
  margin-bottom: 4px;
}

.line-text {
  font-size: 16px;
  line-height: 1.5;
  transition: filter 0.2s;
}

.line.repeat-active {
  outline: 2px solid var(--accent);
}

/* 자막 숨김 모드 */
body.subtitles-hidden .line-text {
  filter: blur(6px);
  user-select: none;
}
body.subtitles-hidden .line.current .line-text,
body.subtitles-hidden .line:hover .line-text {
  filter: blur(0);
}

/* 모바일 */
@media (max-width: 899px) {
  .controls { position: static; }
  .subtitles { max-height: none; }
}
</style>
</head>
<body>

<div class="container">
  <!-- 좌측: 컨트롤 -->
  <div class="controls">
    <a href="index.html" class="back-link">← 전체 목록</a>
    <div class="episode-num">EP 2668 · 가정</div>
    <h1 class="title">배고파서 분노한 고양이</h1>
    <div class="meta">2026.03.09 · 0분 46초</div>

    <div class="audio-wrap">
      <audio id="player" controls preload="metadata">
        <source src="2668_가정_배고파서_분노한_고양이_20260309.mp3" type="audio/mpeg">
      </audio>
    </div>

    <div class="btn-row">
      <button id="btnSubtitles" class="action active" title="자막 토글 (S)">👁️ 자막</button>
      <button id="btnRepeat" class="action" title="현재 문장 반복 (R)">🔁 반복</button>
      <button id="btnAutoNext" class="action" title="자동 다음 문장 (A)">⏭️ 자동</button>
    </div>

    <div class="speed-row">
      <button class="speed" data-speed="0.5">0.5x</button>
      <button class="speed" data-speed="0.75">0.75x</button>
      <button class="speed active" data-speed="1.0">1.0x</button>
      <button class="speed" data-speed="1.25">1.25x</button>
      <button class="speed" data-speed="1.5">1.5x</button>
    </div>

    <div class="help">
      <kbd>Space</kbd> 재생/정지<br>
      <kbd>←</kbd> <kbd>→</kbd> 이전/다음 문장<br>
      <kbd>R</kbd> 현재 문장 반복 토글<br>
      <kbd>S</kbd> 자막 토글<br>
      <kbd>A</kbd> 자동 다음 토글
    </div>
  </div>

  <!-- 우측: 자막 -->
  <div class="subtitles">
    <div class="sub-header">
      <div class="sub-title">대화 스크립트 (4문장)</div>
    </div>
    <div id="lines"></div>
  </div>
</div>

<script>
const SCRIPT = [{"start": 0, "end": 9.0, "text": "Did you feed the cat this morning?"}, {"start": 9.0, "end": 20.0, "text": "I thought you did."}, {"start": 20.0, "end": 33.0, "text": "No wonder he was angry."}, {"start": 33.0, "end": 46.0, "text": "Hurry before he eats our slippers."}];

const player = document.getElementById('player');
const linesEl = document.getElementById('lines');
const btnSubtitles = document.getElementById('btnSubtitles');
const btnRepeat = document.getElementById('btnRepeat');
const btnAutoNext = document.getElementById('btnAutoNext');

let currentIndex = -1;
let repeatMode = false;
let autoNextMode = false;

// 자막 라인 렌더링
function renderLines() {
  linesEl.innerHTML = '';
  SCRIPT.forEach((seg, i) => {
    const div = document.createElement('div');
    div.className = 'line';
    div.dataset.idx = i;
    div.innerHTML = `
      <div class="line-time">${seg.start.toFixed(2)}s - ${seg.end.toFixed(2)}s</div>
      <div class="line-text">${escapeHtml(seg.text)}</div>
    `;
    div.addEventListener('click', () => playLine(i));
    linesEl.appendChild(div);
  });
}

function escapeHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

// 현재 시간에 해당하는 라인 찾기
function findIndexAt(t) {
  for (let i = 0; i < SCRIPT.length; i++) {
    if (t >= SCRIPT[i].start && t < SCRIPT[i].end) return i;
  }
  // 사이 구간이면 가장 최근 시작
  for (let i = SCRIPT.length - 1; i >= 0; i--) {
    if (t >= SCRIPT[i].start) return i;
  }
  return -1;
}

function highlightLine(idx) {
  document.querySelectorAll('.line.current').forEach(el => el.classList.remove('current'));
  if (idx < 0) return;
  const el = linesEl.querySelector(`[data-idx="${idx}"]`);
  if (!el) return;
  el.classList.add('current');
  // 화면 밖이면 스크롤
  const rect = el.getBoundingClientRect();
  const containerRect = linesEl.parentElement.getBoundingClientRect();
  if (rect.top < containerRect.top || rect.bottom > containerRect.bottom) {
    el.scrollIntoView({ block: 'center', behavior: 'smooth' });
  }
}

function playLine(idx) {
  if (idx < 0 || idx >= SCRIPT.length) return;
  player.currentTime = SCRIPT[idx].start;
  player.play();
  highlightLine(idx);
  currentIndex = idx;
}

// 시간 업데이트 → 현재 라인 하이라이트
player.addEventListener('timeupdate', () => {
  const t = player.currentTime;
  const idx = findIndexAt(t);

  // 반복 모드: 현재 라인의 end 도달하면 시작점으로
  if (repeatMode && currentIndex >= 0) {
    if (t >= SCRIPT[currentIndex].end) {
      player.currentTime = SCRIPT[currentIndex].start;
      return;
    }
  }

  if (idx !== currentIndex) {
    currentIndex = idx;
    highlightLine(idx);
  }
});

// 한 라인 끝나면 자동 다음 (auto next 모드)
player.addEventListener('timeupdate', () => {
  if (!autoNextMode || repeatMode) return;
  if (currentIndex < 0 || currentIndex >= SCRIPT.length - 1) return;
  if (player.currentTime >= SCRIPT[currentIndex].end + 0.1) {
    // 다음 라인 사이 간격이 있을 때 점프
    const next = SCRIPT[currentIndex + 1];
    if (next && player.currentTime < next.start - 1) {
      player.currentTime = next.start;
    }
  }
});

// 자막 토글
btnSubtitles.addEventListener('click', () => {
  document.body.classList.toggle('subtitles-hidden');
  btnSubtitles.classList.toggle('active', !document.body.classList.contains('subtitles-hidden'));
});

// 반복 토글
btnRepeat.addEventListener('click', () => {
  repeatMode = !repeatMode;
  btnRepeat.classList.toggle('active', repeatMode);
  document.querySelectorAll('.line.repeat-active').forEach(el => el.classList.remove('repeat-active'));
  if (repeatMode && currentIndex >= 0) {
    const el = linesEl.querySelector(`[data-idx="${currentIndex}"]`);
    if (el) el.classList.add('repeat-active');
  }
});

// 자동 다음 토글
btnAutoNext.addEventListener('click', () => {
  autoNextMode = !autoNextMode;
  btnAutoNext.classList.toggle('active', autoNextMode);
});

// 속도 조절
document.querySelectorAll('.speed').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.speed').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    player.playbackRate = parseFloat(btn.dataset.speed);
  });
});

// 키보드 단축키
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === ' ') {
    e.preventDefault();
    if (player.paused) player.play(); else player.pause();
  } else if (e.key === 'ArrowLeft') {
    e.preventDefault();
    if (currentIndex > 0) playLine(currentIndex - 1);
    else playLine(0);
  } else if (e.key === 'ArrowRight') {
    e.preventDefault();
    if (currentIndex < SCRIPT.length - 1) playLine(currentIndex + 1);
  } else if (e.key === 'r' || e.key === 'R') {
    btnRepeat.click();
  } else if (e.key === 's' || e.key === 'S') {
    btnSubtitles.click();
  } else if (e.key === 'a' || e.key === 'A') {
    btnAutoNext.click();
  }
});

renderLines();

// 학습 진행 기록 (localStorage)
player.addEventListener('play', () => {
  try {
    const key = 'ebs_played_' + '2668_가정_배고파서_분노한_고양이_20260309';
    const data = JSON.parse(localStorage.getItem(key) || '{}');
    data.last_played = new Date().toISOString();
    data.play_count = (data.play_count || 0) + 1;
    localStorage.setItem(key, JSON.stringify(data));
  } catch (e) {}
});
</script>

</body>
</html>
